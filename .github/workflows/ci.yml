name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly re-run so the security audit catches newly disclosed advisories
    # even when there are no new commits. Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"

# Drop superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Pedantic lints are configured as `warn` in Cargo.toml, so they show up
      # in the logs without failing the build.
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --all-targets

  perft-timing:
    name: Perft timing (release)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C target-cpu=native"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Compile first so build time is excluded from the measurement below.
      - name: Build release tests
        run: cargo test --release --no-run
      - name: Run and time perft tests
        run: |
          start=$(date +%s.%N)
          cargo test --release run_perft_tests -- --nocapture
          end=$(date +%s.%N)
          elapsed=$(awk "BEGIN { printf \"%.3f\", $end - $start }")
          {
            echo "### Perft timing (release, target-cpu=native, fat LTO)"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Elapsed | ${elapsed}s |"
          } >> "$GITHUB_STEP_SUMMARY"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --all-targets --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: cargo audit
        run: cargo audit -D warnings
