name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0-alpha && git push origin v0.1.0-alpha
# `workflow_dispatch` builds and uploads the artifacts without publishing a
# release, so the matrix can be dry-run from the Actions tab before tagging.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Superseded runs on the same ref can be dropped to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Binary name (Cargo package name). Kept here so the name lives in one place.
  BIN_NAME: sabertooth

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Portable, distributable binary: uses the fat-LTO release profile from
      # Cargo.toml but the default baseline CPU (NOT target-cpu=native, which
      # would produce artifacts that crash on older CPUs of the same arch).
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked

      # Package (unix): tar.gz containing the binary, README, and LICENSE.
      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          staging="${BIN_NAME}-${version}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$staging/"
          cp README.md LICENSE "$staging/"
          tar czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      # Package (windows): zip containing the .exe, README, and LICENSE.
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $staging = "$env:BIN_NAME-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" $staging
          Copy-Item README.md, LICENSE $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish on a tag push; workflow_dispatch runs stop after `build`.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
