version: 2
updates:
  # Rust dependencies in Cargo.toml / Cargo.lock.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    groups:
      cargo:
        patterns:
          - "*"

  # Versions of the actions used in .github/workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
